<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<script>
const container = document.getElementById("research-network");
const descriptionBox = document.getElementById("node-description");

// ================= NODES =================
const nodes = new vis.DataSet([

{ id:1, label:"Urban–Environment Spatial Dynamics", size:70, group:"core" },

// Morphology
{ id:2, label:"Urban Spatial Dispersion", group:"morph" },
{ id:3, label:"Urban Fragmentation", group:"morph" },
{ id:4, label:"Urban Compactness", group:"morph" },
{ id:5, label:"Landscape Expansion Index (LEI)", group:"morph" },
{ id:6, label:"Outlying Expansion", group:"morph" },
{ id:7, label:"Urban Growth Corridors", group:"morph" },
{ id:8, label:"Metropolitan Conurbation", group:"morph" },
{ id:9, label:"Built-up Patch Dynamics", group:"morph" },

// Entropy
{ id:20, label:"Shannon Entropy", group:"entropy" },
{ id:21, label:"LULC Diversity", group:"entropy" },
{ id:22, label:"Land-Cover Evenness", group:"entropy" },
{ id:23, label:"Spatial Complexity", group:"entropy" },
{ id:24, label:"Patch-based Metrics", group:"entropy" },

// Climate
{ id:30, label:"Land Surface Temperature", group:"climate" },
{ id:31, label:"Urban Heat Island", group:"climate" },
{ id:32, label:"Carbon Emission Modeling", group:"climate" },
{ id:33, label:"RSEI Ecological Index", group:"climate" },
{ id:34, label:"Vegetation Degradation", group:"climate" },
{ id:35, label:"Ecological Corridors", group:"climate" },
{ id:36, label:"Heat–Heat Corridors", group:"climate" },

// Geo
{ id:40, label:"Geomorphological Complexity", group:"geo" },
{ id:41, label:"Topographic Position Index", group:"geo" },

// Data
{ id:50, label:"Google Earth Engine", group:"data" },
{ id:51, label:"Landsat & Sentinel", group:"data" },
{ id:52, label:"VIIRS Nighttime Light", group:"data" },
{ id:53, label:"Support Vector Machine", group:"data" },
{ id:54, label:"Remote Sensing", group:"data" }

]);

// ================= EDGES =================
const edges = new vis.DataSet([

// Core connections
{ from:1, to:2 }, { from:1, to:20 }, { from:1, to:30 },
{ from:1, to:40 }, { from:1, to:50 },

// Morph internal
{ from:2, to:3 }, { from:3, to:4 }, { from:4, to:5 },
{ from:5, to:6 }, { from:6, to:7 }, { from:7, to:8 },
{ from:8, to:9 },

// Entropy internal
{ from:20, to:21 }, { from:21, to:22 },
{ from:22, to:23 }, { from:23, to:24 },

// Climate internal
{ from:30, to:31 }, { from:31, to:32 },
{ from:32, to:33 }, { from:33, to:34 },
{ from:34, to:35 }, { from:35, to:36 },

// Geo
{ from:40, to:41 },

// Data internal
{ from:50, to:51 }, { from:51, to:52 },
{ from:52, to:53 }, { from:53, to:54 },

// Cross-cluster links
{ from:2, to:20 },
{ from:3, to:30 },
{ from:5, to:40 },
{ from:21, to:33 },
{ from:31, to:35 },
{ from:52, to:20 },
{ from:50, to:30 },
{ from:54, to:32 },
{ from:9, to:24 },
{ from:9, to:5 },
{ from:24, to:4 },
{ from:36, to:35 },
{ from:41, to:5 }

]);

// ================= OPTIONS =================
const options = {
nodes:{
  shape:"dot",
  size:20,
  scaling:{
    min:20,
    max:80,
    label:{ enabled:true, min:18, max:28 }
  },
  font:{
    size:20,
    strokeWidth:3,
    strokeColor:"#ffffff"
  }
},
edges:{
  width:2,
  smooth:{ type:"dynamic" }
},
physics:{
  barnesHut:{
    gravitationalConstant:-12000,
    springLength:220
  },
  stabilization:{ iterations:250 }
},
interaction:{
  hover:true,
  navigationButtons:true,
  keyboard:true,
  dragNodes:true,
  dragView:false
},
groups:{
  core:{color:"#455a64"},
  morph:{color:"#2e7d32"},
  entropy:{color:"#1565c0"},
  climate:{color:"#c62828"},
  geo:{color:"#6a1b9a"},
  data:{color:"#ef6c00"}
}
};

// ================= INIT =================
const network = new vis.Network(container,{nodes,edges},options);

// Auto zoom extent
network.once("stabilizationIterationsDone", function () {
    network.fit({ animation:true });
});

// ================= CONTROLS =================
function resetView(){ network.fit({animation:true}); }
function zoomToCore(){ network.focus(1,{scale:1.3,animation:true}); }

function clusterByGroup(){

  const clusterMap = {
    morph:"Urban Morphology",
    entropy:"Land Use & Entropy Modeling",
    climate:"Climate & Environmental Risk",
    geo:"Geomorphology",
    data:"Spatial Data & Methods"
  };

  Object.keys(clusterMap).forEach(groupName => {
    network.cluster({
      joinCondition:(node)=> node.group===groupName,
      clusterNodeProperties:{
        id:"cluster_"+groupName,
        label: clusterMap[groupName],
        shape:"database",
        color: options.groups[groupName].color,
        font:{size:20}
      }
    });
  });
}

function openClusters(){
  ["morph","entropy","climate","geo","data"].forEach(g=>{
    try{ network.openCluster("cluster_"+g); }catch(e){}
  });
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    container.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// Dark mode adapt
function updateGraphTheme(){
  const isDark = document.body.classList.contains("dark-mode");
  network.setOptions({
    edges:{ color:isDark ? "#555" : "#999" },
    nodes:{ font:{ color:isDark ? "#fff" : "#000" } }
  });
}
updateGraphTheme();
new MutationObserver(updateGraphTheme)
.observe(document.body,{attributes:true});
</script>
